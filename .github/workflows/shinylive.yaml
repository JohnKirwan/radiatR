# PARKED — the static shinylive (in-browser WebAssembly) build of the app is
# currently disabled.
#
# Why: a working, release-driven redesign exists on branch `ci/fix-shinylive`
# (PR #43). It builds radiatR into a webR filesystem image, attaches it to a
# GitHub Release, and lets `shinylive::export()` pull it in. End-to-end CI
# proved every step works EXCEPT the final asset download: shinylive fetches
# the release asset with an unauthenticated `download.file()`, and because this
# repository is private, that public URL returns 404. shinylive offers no auth
# hook for that download.
#
# To revive it, pick one of:
#   * make the repository public, then merge PR #43 (the canonical build works
#     as-is); or
#   * keep it private and switch to a self-hosted VFS image that the app mounts
#     at runtime from the public Pages site (no private-asset fetch).
#
# Until then this workflow only runs on manual dispatch and does nothing, so it
# never fails CI. The other app delivery paths (local `launch_app()` and Shiny
# Server / shinyapps.io) are unaffected; see README "The graphical app".
on:
  workflow_dispatch:

name: shinylive.yaml

jobs:
  parked:
    runs-on: ubuntu-latest
    steps:
      - name: Static shinylive build is parked
        run: |
          echo "The shinylive static-app build is parked."
          echo "See .github/workflows/shinylive.yaml header and PR #43."
