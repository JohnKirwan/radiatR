# Deploy the bundled Shiny app (inst/app) to shinyapps.io.
#
# Unlike the shinylive build (which compiles the app to WebAssembly and runs R in
# the browser -- heavy first load, no SharedArrayBuffer on plain GitHub Pages),
# this publishes to a real Shiny server: R runs server-side, so the page loads
# like any normal web app. This is the recommended "live app" for end users; the
# shinylive build (shinylive.yaml -> gh-pages /app) remains as a no-server
# fallback.
#
# Runs on a published release (to track the released version) and on demand
# (workflow_dispatch). radiatR is installed FROM GitHub so its DESCRIPTION carries
# the RemoteType/RemoteRef fields rsconnect needs to record in the deploy manifest
# (shinyapps.io then reinstalls radiatR from the public GitHub repo at build time;
# it is not on CRAN).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SHINYAPPS_NAME   - the shinyapps.io *account name* (the <name> in
#                      https://<name>.shinyapps.io/), NOT the login email.
#   SHINYAPPS_TOKEN  - token  from shinyapps.io -> Account -> Tokens.
#   SHINYAPPS_SECRET - secret from the same token.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "radiatR git ref to install & deploy (branch, tag, or SHA)"
        default: master
        required: false

name: shinyapps.yaml

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The project .Rprofile activates renv, which switches .libPaths() to the
      # project library and breaks setup-r-dependencies' pak install. Disable the
      # renv autoloader so CI installs into the normal library (same as the other
      # workflows here).
      RENV_CONFIG_AUTOLOADER_ENABLED: false
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # shinyapps.io's build servers lag the newest R release: deploying with
          # the very latest (e.g. 4.6.1) fails with "Unsupported R version ... for
          # operating system jammy". Pin one minor behind (the version the package
          # is already CI-tested on via the oldrel-1 R-CMD-check job). The manifest
          # rsconnect writes records this version for the shinyapps build.
          r-version: 'oldrel-1'

      # The app's runtime dependencies. radiatR (installed from GitHub so the
      # remote metadata is recorded) brings circular/ggplot2; the rest are
      # app-only (UI + SVG export). The ref is the release tag, or the dispatch
      # input, defaulting to master.
      - name: Install app dependencies (radiatR from GitHub)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rsconnect
            any::shiny
            any::bslib
            any::svglite
            github::JohnKirwan/radiatR@${{ github.event.release.tag_name || github.event.inputs.ref || 'master' }}

      - name: Deploy to shinyapps.io
        shell: Rscript {0}
        env:
          SHINYAPPS_NAME:   ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN:  ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          for (v in c("SHINYAPPS_NAME", "SHINYAPPS_TOKEN", "SHINYAPPS_SECRET"))
            if (!nzchar(Sys.getenv(v)))
              stop(sprintf("Missing repository secret: %s", v), call. = FALSE)
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir      = "inst/app",
            appName     = "radiatR",
            appTitle    = "radiatR",
            forceUpdate = TRUE,
            logLevel    = "verbose"
          )
